<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atv-pratica-15</title>
</head>

<body>
    <div class="container-cadastro">
        <h1>Portal do Aluno</h1>
        <form action="#" method="GET">
            <div>
                <label for="nome_aluno">Nome Completo:</label>
                <input type="text" id="nome_aluno" name="nome">
            </div>

            <div style="margin-top: 15px;">
                <label for="semestre">Semestre Atual:</label>
                <select id="semestre" name="semestre">
                    <option value="1">1º Semestre</option>
                    <option value="2">2º Semestre</option>
                    <option value="3">3º Semestre</option>
                </select>
            </div>

            <button type="submit" style="margin-top: 20px;">Enviar Dados</button>
        </form>
    </div>
</body>

</html>
