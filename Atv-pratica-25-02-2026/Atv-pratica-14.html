<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atv-pratica-14</title>
</head>

<body>
    <form>
        <p>Quais tecnologias você domina?</p>
        <input type="checkbox" id="html" name="tech" value="HTML">
        <label for="html">HTML</label>
        <input type="checkbox" id="css" name="tech" value="CSS">
        <label for="css">CSS</label>

        <p>Qual seu turno preferido?</p>
        <input type="radio" id="manha" name="turno" value="M">
        <label for="manha">Manhã</label>
        <input type="radio" id="noite" name="turno" value="N">
        <label for="noite">Noite</label>
    </form>
</body>

</html>
