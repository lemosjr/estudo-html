<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro de Produtos</title>
</head>

<body>

<header>
    <h1>Cadastro de Produtos</h1>
</header>

<main>

<section>
    <h2>Novo Produto</h2>
    <form>
        <label>Nome</label>
        <input type="text">

        <label>Preço</label>
        <input type="number">

        <button type="submit">Cadastrar</button>
    </form>
</section>

<section>
    <h2>Lista de Produtos</h2>
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Preço</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Produto Exemplo</td>
                <td>R$ 100,00</td>
            </tr>
        </tbody>
    </table>
</section>

</main>

</body>
</html>
