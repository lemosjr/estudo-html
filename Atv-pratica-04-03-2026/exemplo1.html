<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema de Login</title>
</head>

<body>

<main>
    <header>
        <h1>Login</h1>
    </header>

    <form>
        <section>
            <label for="email">Email</label>
            <input type="email" id="email">
        </section>

        <section>
            <label for="senha">Senha</label>
            <input type="password" id="senha">
        </section>

        <button type="submit">Entrar</button>
    </form>

    <footer>
        <p>© 2026 Sistema Seguro</p>
    </footer>
</main>

</body>
</html>
